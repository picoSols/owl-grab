<svg width="128" height="128" viewBox="0 0 128 128" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Ear tufts peeking from top -->
  <path d="M30 28 L18 2 L44 24 Z" fill="#FF40E0"/>
  <path d="M98 28 L110 2 L84 24 Z" fill="#FF40E0"/>

  <!-- Head fill (cropped oval) -->
  <ellipse cx="64" cy="72" rx="64" ry="60" fill="#1a1a2e"/>

  <!-- Left eye socket -->
  <ellipse cx="38" cy="60" rx="30" ry="28" fill="#0d0d1a"/>
  <!-- Right eye socket -->
  <ellipse cx="90" cy="60" rx="30" ry="28" fill="#0d0d1a"/>

  <!-- Left eye glow ring -->
  <ellipse cx="38" cy="60" rx="26" ry="24" fill="none" stroke="#FF40E0" stroke-width="3"/>
  <!-- Right eye glow ring -->
  <ellipse cx="90" cy="60" rx="26" ry="24" fill="none" stroke="#FF40E0" stroke-width="3"/>

  <!-- Left iris -->
  <ellipse cx="38" cy="60" rx="16" ry="16" fill="#FF40E0"/>
  <!-- Right iris -->
  <ellipse cx="90" cy="60" rx="16" ry="16" fill="#FF40E0"/>

  <!-- Left pupil -->
  <ellipse cx="42" cy="57" rx="6" ry="7" fill="#1a1a2e"/>
  <!-- Right pupil -->
  <ellipse cx="94" cy="57" rx="6" ry="7" fill="#1a1a2e"/>

  <!-- Eye shine -->
  <circle cx="34" cy="53" r="4" fill="white" opacity="0.9"/>
  <circle cx="86" cy="53" r="4" fill="white" opacity="0.9"/>

  <!-- Brow line -->
  <path d="M8 44 Q38 30 64 44 Q90 30 120 44" fill="none" stroke="#FF40E0" stroke-width="2.5" opacity="0.5"/>

  <!-- Beak -->
  <path d="M56 88 L64 104 L72 88 Z" fill="#FF9F40"/>
</svg>
