<svg width="128" height="128" viewBox="0 0 128 128" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="128" height="128" rx="20" fill="#1a1a2e"/>

  <!-- Ear tufts -->
  <path d="M38 32 L26 8 L48 28 Z" fill="#FF40E0"/>
  <path d="M90 32 L102 8 L80 28 Z" fill="#FF40E0"/>

  <!-- Left eye socket -->
  <ellipse cx="46" cy="52" rx="24" ry="22" fill="#0d0d1a"/>
  <!-- Right eye socket -->
  <ellipse cx="82" cy="52" rx="24" ry="22" fill="#0d0d1a"/>

  <!-- Left eye glow ring -->
  <ellipse cx="46" cy="52" rx="20" ry="18" fill="none" stroke="#FF40E0" stroke-width="2.5"/>
  <!-- Right eye glow ring -->
  <ellipse cx="82" cy="52" rx="20" ry="18" fill="none" stroke="#FF40E0" stroke-width="2.5"/>

  <!-- Left iris -->
  <ellipse cx="46" cy="52" rx="12" ry="12" fill="#FF40E0"/>
  <!-- Right iris -->
  <ellipse cx="82" cy="52" rx="12" ry="12" fill="#FF40E0"/>

  <!-- Left pupil -->
  <ellipse cx="49" cy="50" rx="5" ry="6" fill="#1a1a2e"/>
  <!-- Right pupil -->
  <ellipse cx="85" cy="50" rx="5" ry="6" fill="#1a1a2e"/>

  <!-- Eye shine -->
  <circle cx="42" cy="47" r="3" fill="white" opacity="0.85"/>
  <circle cx="78" cy="47" r="3" fill="white" opacity="0.85"/>

  <!-- Brow line -->
  <path d="M24 40 Q46 30 64 40 Q82 30 104 40" fill="none" stroke="#FF40E0" stroke-width="2" opacity="0.5"/>

  <!-- Beak -->
  <path d="M57 70 L64 82 L71 70 Z" fill="#FF9F40"/>

  <!-- Code brackets on chest -->
  <text x="37" y="112" font-family="monospace" font-size="32" font-weight="bold" fill="#FF40E0" opacity="0.6">&lt;/&gt;</text>
</svg>
