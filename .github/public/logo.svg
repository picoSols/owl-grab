<svg width="294" height="294" viewBox="0 0 294 294" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background circle -->
  <circle cx="147" cy="147" r="140" fill="#1a1a2e"/>

  <!-- Owl body/head shape -->
  <path d="M147 40 C90 40 50 90 50 145 C50 200 90 255 147 255 C204 255 244 200 244 145 C244 90 204 40 147 40Z" fill="#2d2d4e"/>

  <!-- Ear tufts -->
  <path d="M95 75 L75 30 L110 65 Z" fill="#FF40E0"/>
  <path d="M199 75 L219 30 L184 65 Z" fill="#FF40E0"/>

  <!-- Left eye socket -->
  <ellipse cx="112" cy="130" rx="38" ry="36" fill="#1a1a2e"/>
  <!-- Right eye socket -->
  <ellipse cx="182" cy="130" rx="38" ry="36" fill="#1a1a2e"/>

  <!-- Left eye glow ring -->
  <ellipse cx="112" cy="130" rx="32" ry="30" fill="none" stroke="#FF40E0" stroke-width="3"/>
  <!-- Right eye glow ring -->
  <ellipse cx="182" cy="130" rx="32" ry="30" fill="none" stroke="#FF40E0" stroke-width="3"/>

  <!-- Left iris -->
  <ellipse cx="112" cy="130" rx="18" ry="18" fill="#FF40E0"/>
  <!-- Right iris -->
  <ellipse cx="182" cy="130" rx="18" ry="18" fill="#FF40E0"/>

  <!-- Left pupil -->
  <ellipse cx="116" cy="127" rx="8" ry="9" fill="#1a1a2e"/>
  <!-- Right pupil -->
  <ellipse cx="186" cy="127" rx="8" ry="9" fill="#1a1a2e"/>

  <!-- Eye shine -->
  <circle cx="108" cy="123" r="4" fill="white" opacity="0.8"/>
  <circle cx="178" cy="123" r="4" fill="white" opacity="0.8"/>

  <!-- Beak -->
  <path d="M137 155 L147 175 L157 155 Z" fill="#FF9F40"/>

  <!-- Brow line between eyes -->
  <path d="M80 110 Q112 95 147 110 Q182 95 214 110" fill="none" stroke="#FF40E0" stroke-width="2.5" opacity="0.6"/>

  <!-- Chest feather pattern (code brackets) -->
  <text x="117" y="220" font-family="monospace" font-size="48" font-weight="bold" fill="#FF40E0" opacity="0.7">&lt;/&gt;</text>

  <!-- Cursor arrow overlay (bottom right) -->
  <g transform="translate(195, 185) scale(0.8)">
    <path d="M10 5 L10 65 L28 47 L50 80 L62 72 L40 39 L62 39 Z" fill="white" stroke="#1a1a2e" stroke-width="3" stroke-linejoin="round"/>
  </g>
</svg>
